name: nightly-live

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  live:
    if: ${{ secrets.SEC_USER_AGENT != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Live refresh core tickers
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          fg refresh-ticker --ticker AAPL
          fg refresh-ticker --ticker MSFT
          fg refresh-ticker --ticker KO
          fg quality-report --ticker AAPL > nightly-report.txt
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-live-report
          path: nightly-report.txt
